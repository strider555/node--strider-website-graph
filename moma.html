<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoMA Collection Explorer</title>
  <link rel="stylesheet" href="./styles.css">
  <style>
    /* MoMA mobile overrides — legend uses different class names */
    @media (max-width: 768px) {
      .app-header { flex-direction: column; align-items: stretch; padding: 8px 12px; gap: 6px; }
      .app-header .subtitle { display: none; }
      .controls { width: 100%; flex-wrap: nowrap; }
      .search-container { flex: 1; min-width: 0; }
      .filter-buttons { display: none; }

      .legend {
        position: fixed; top: auto; bottom: 0; left: 0; right: 0;
        width: 100%; max-height: none; border-radius: 0;
        border: none; border-top: 1px solid rgba(255,255,255,0.1);
        padding: 0; display: flex; align-items: stretch; gap: 0;
        overflow: visible; z-index: 20;
        background: rgba(20,20,32,0.96); backdrop-filter: blur(12px);
      }
      .legend h3, .legend-item[data-type="all"] { display: none; }
      .legend-group { flex: 1; min-width: 0; position: static; }
      .legend-group > .legend-item {
        margin: 0; padding: 10px 2px 8px; justify-content: center;
        flex-direction: column; align-items: center; gap: 3px;
        border-radius: 0; font-size: 10px;
        border-top: 2px solid transparent; opacity: 0.7;
      }
      .legend-group > .legend-item span { font-size: 9px; line-height: 1; }
      .legend-group > .legend-item .legend-arrow { display: none; }
      .legend-dot { width: 14px; height: 14px; border-radius: 5px; }
      .legend-group.open > .legend-item { border-top-color: #e6a817; opacity: 1; }

      .legend-sub {
        display: none; position: absolute; bottom: 100%; left: 0; right: 0;
        max-height: 40vh; overflow-y: auto; padding: 0;
        background: rgba(20,20,32,0.98); border-top: 1px solid rgba(255,255,255,0.1);
        border-radius: 12px 12px 0 0; z-index: 25;
        box-shadow: 0 -4px 24px rgba(0,0,0,0.4);
      }
      .legend-group.open .legend-sub { display: block; padding: 8px 12px 12px; }
      .legend-sub-item { padding: 10px 12px; font-size: 14px; }

      .side-panel {
        width: 100%; height: 60vh; right: auto; left: 0;
        top: auto; bottom: -60vh; border-left: none;
        border-top: 1px solid rgba(255,255,255,0.1);
        transition: bottom 0.25s ease-out;
      }
      .side-panel.open { right: auto; bottom: 0; }

      .zoom-controls { bottom: 60px; right: 12px; }

      #graph { height: calc(100vh - 50px); }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="app-header">
    <div>
      <h1>MoMA Collection Explorer</h1>
      <div class="subtitle">Interactive visualization of 160,000+ artworks</div>
    </div>
    <div class="controls">
      <div class="search-container">
        <input type="text" class="search-input" id="searchInput" placeholder="Search tags or artworks..." autocomplete="off">
        <div class="search-dropdown" id="searchDropdown"></div>
      </div>
      <select class="filter-select" id="filterSelect">
        <option value="all">All Departments</option>
      </select>
      
    </div>
  </header>

  <div class="legend" id="legend">
    <h3>Tag Types</h3>
    <div class="legend-item" data-type="all">
      <span class="legend-dot" style="background:#888"></span>
      <span>All Types</span>
    </div>
    <div class="legend-group" data-type="Department">
      <div class="legend-item">
        <span class="legend-dot" style="background:#e6a817"></span>
        <span>Department</span>
        <span class="legend-arrow">›</span>
      </div>
      <div class="legend-sub"></div>
    </div>
    <div class="legend-group" data-type="Classification">
      <div class="legend-item">
        <span class="legend-dot" style="background:#4ecdc4"></span>
        <span>Classification</span>
        <span class="legend-arrow">›</span>
      </div>
      <div class="legend-sub"></div>
    </div>
    <div class="legend-group" data-type="Nationality">
      <div class="legend-item">
        <span class="legend-dot" style="background:#45b7d1"></span>
        <span>Nationality</span>
        <span class="legend-arrow">›</span>
      </div>
      <div class="legend-sub"></div>
    </div>
    <div class="legend-group" data-type="Decade">
      <div class="legend-item">
        <span class="legend-dot" style="background:#96ceb4"></span>
        <span>Decade</span>
        <span class="legend-arrow">›</span>
      </div>
      <div class="legend-sub"></div>
    </div>
  </div>

  <div id="tooltip" class="tooltip">
    <div id="tooltipTitle" class="tooltip-title"></div>
    <div id="tooltipDetail" class="tooltip-detail"></div>
  </div>

  <div class="zoom-controls">
    <button class="zoom-btn" id="zoomIn">+</button>
    <button class="zoom-btn" id="zoomOut">−</button>
    <button class="zoom-btn" id="zoomReset">⟲</button>
  </div>

  <svg id="graph"></svg>

  <div class="side-panel" id="sidePanel">
    <button class="panel-close" id="panelClose">×</button>
    <div class="panel-header">
      <span id="panelColorIndicator" class="panel-color-indicator"></span>
      <h2 id="panelTitle"></h2>
    </div>
    <div id="panelTypeLabel" class="panel-type-label"></div>
    <div id="panelSummary" class="panel-summary"></div>
    <div id="panelActions" style="padding:0 24px 12px;flex-shrink:0"><a id="viewFullBtn" href="#" target="_blank" class="filter-select" style="display:inline-block;background:var(--gold);color:var(--bg-dark);padding:8px 16px;border-radius:6px;text-decoration:none;font-weight:600;font-size:13px;border:none">View Full Details →</a></div>
    <div id="objectGrid" class="object-grid"></div>
  </div>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script>
// MoMA Explorer - standalone script
let graphData = null;
let pulseData = null;
let artistData = null;
let simulation = null;
let svgEl, gEl, zoomBehavior;
let selectedTag = null;
let selectedTags = new Set();

const tagColors = {
  Department: '#E6A817',
  Classification: '#4ecdc4',
  Nationality: '#45b7d1',
  Decade: '#96ceb4'
};

const F = {i:'id',t:'title',a:'artistName',d:'date',m:'medium',dp:'department',cl:'classification',n:'nationality',de:'decade',u:'url'};
function expand(o) { const r = {}; for (const [k,v] of Object.entries(o)) r[F[k]||k] = v; return r; }

async function loadData() {
  const resp = await fetch('./data/moma-graph.json');
  graphData = await resp.json();
  console.log(`Loaded ${graphData.tags.length} tags, ${graphData.links.length} links, ${graphData.objectCount} objects`);

  // Build department filter dropdown
  const depts = graphData.tags.filter(t => t.type === 'Department').sort((a,b) => b.count - a.count);
  const filterSelect = document.getElementById('filterSelect');
  depts.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d.id;
    opt.textContent = d.name;
    filterSelect.appendChild(opt);
  });
  filterSelect.addEventListener('change', () => {
    const val = filterSelect.value;
    if (val === 'all') {
      // Reset to all
      d3.selectAll('.node').attr('opacity', 1);
      d3.selectAll('.link').attr('opacity', 0.3);
    } else {
      selectTag(val);
    }
  });

  try {
    const aResp = await fetch('./data/moma-artists.json');
    if (aResp.ok) artistData = await aResp.json();
  } catch(e) {}

  initGraph();
  setupLegend();
  setupSearch();
  setupZoom();
  document.getElementById('panelClose').addEventListener('click', closeSidePanel);
}

function initGraph() {
  const width = window.innerWidth;
  const height = window.innerHeight - 80;

  svgEl = d3.select('#graph').attr('width', width).attr('height', height);
  svgEl.selectAll('*').remove();
  gEl = svgEl.append('g');
  zoomBehavior = d3.zoom().scaleExtent([0.1, 10]).on('zoom', e => gEl.attr('transform', e.transform));
  svgEl.call(zoomBehavior);

  const tags = graphData.tags;
  const tagIds = new Set(tags.map(t => t.id));
  const links = graphData.links.filter(l => tagIds.has(l.source) && tagIds.has(l.target));

  const ext = d3.extent(tags, d => d.count);
  const r = d3.scaleSqrt().domain(ext).range([6, 40]);

  const nodes = tags.map(t => ({...t, radius: r(t.count)}));
  const nodeMap = new Map(nodes.map(n => [n.id, n]));
  const simLinks = links.map(l => ({source: nodeMap.get(l.source)||l.source, target: nodeMap.get(l.target)||l.target, value: l.value}))
    .filter(l => l.source && l.target && typeof l.source === 'object');

  simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(simLinks).id(d => d.id).distance(280).strength(l => Math.min((l.value||1)/1000, 0.15)))
    .force('charge', d3.forceManyBody().strength(-2000).distanceMax(1500))
    .force('center', d3.forceCenter(width/2, height/2))
    .force('collision', d3.forceCollide(d => d.radius + 35))
    .force('x', d3.forceX(width/2).strength(0.025))
    .force('y', d3.forceY(height/2).strength(0.025));

  const link = gEl.append('g').selectAll('line').data(simLinks).join('line')
    .attr('stroke', 'rgba(255,255,255,0.08)').attr('stroke-width', d => Math.min((d.value||1)/50, 3));

  const tooltip = document.getElementById('tooltip');

  const node = gEl.append('g').selectAll('g').data(nodes).join('g')
    .call(d3.drag()
      .on('start', (e,d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag', (e,d) => { d.fx=e.x; d.fy=e.y; })
      .on('end', (e,d) => { if (!e.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; }));

  node.append('circle')
    .attr('r', d => d.radius)
    .attr('fill', d => tagColors[d.type] || '#888')
    .attr('fill-opacity', 0.85)
    .attr('stroke', 'rgba(255,255,255,0.2)').attr('stroke-width', 1)
    .attr('cursor', 'pointer')
    .on('click', (e,d) => selectTag(d.id))
    .on('mouseover', function(e,d) {
      tooltip.style.left = (e.pageX+12)+'px';
      tooltip.style.top = (e.pageY-10)+'px';
      tooltip.classList.add('show');
      document.getElementById('tooltipTitle').textContent = d.name;
      const col = tagColors[d.type]||'#888';
      document.getElementById('tooltipDetail').innerHTML =
        `<span style="display:inline-block;padding:2px 6px;background:${col};color:#0d1117;border-radius:4px;font-size:10px;font-weight:600;text-transform:uppercase;margin-right:6px">${d.type}</span>${d.count.toLocaleString()} artworks`;
    })
    .on('mousemove', function(e) { tooltip.style.left=(e.pageX+12)+'px'; tooltip.style.top=(e.pageY-10)+'px'; })
    .on('mouseout', () => tooltip.classList.remove('show'));

  node.append('text')
    .text(d => d.radius > 12 ? (d.name.length > 18 ? d.name.slice(0,18)+'…' : d.name) : '')
    .attr('text-anchor','middle').attr('dy', d => d.radius+14)
    .attr('fill','#ccc').attr('font-size','11px').attr('pointer-events','none');

  node.append('text')
    .text(d => d.radius > 12 ? d.count.toLocaleString() : '')
    .attr('text-anchor','middle').attr('dy',4)
    .attr('fill','#fff').attr('font-size', d => Math.min(d.radius*0.6,14)+'px')
    .attr('font-weight','600').attr('pointer-events','none');

  simulation.on('tick', () => {
    link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
    node.attr('transform', d => `translate(${d.x},${d.y})`);
  });
}

function selectTag(tagId) {
  // Toggle multi-select
  if (selectedTags.has(tagId)) {
    selectedTags.delete(tagId);
  } else {
    selectedTags.add(tagId);
  }
  selectedTag = selectedTags.size ? tagId : null;

  // Update legend highlights
  document.querySelectorAll('.legend-sub-item').forEach(el => {
    const isSel = selectedTags.has(el.dataset.tagId);
    el.classList.toggle('selected', isSel);
    const cb = el.querySelector('.sub-checkbox');
    if (cb) cb.textContent = isSel ? '☑' : '☐';
  });

  if (selectedTags.size === 0) {
    gEl.selectAll('circle').attr('stroke','rgba(255,255,255,0.2)').attr('stroke-width',1).attr('fill-opacity',0.85);
    closeSidePanel();
    return;
  }

  // Highlight selected nodes
  gEl.selectAll('circle')
    .attr('stroke', d => selectedTags.has(d.id) ? '#fff' : 'rgba(255,255,255,0.2)')
    .attr('stroke-width', d => selectedTags.has(d.id) ? 3 : 1)
    .attr('fill-opacity', d => selectedTags.has(d.id) ? 1 : 0.3);

  // Zoom to last toggled
  const nd = gEl.selectAll('circle').filter(d => d.id===tagId).datum();
  if (nd) {
    const w = +svgEl.attr('width'), h = +svgEl.attr('height'), s = 1.5;
    svgEl.transition().duration(500).call(zoomBehavior.transform,
      d3.zoomIdentity.translate(w/2 - nd.x*s, h/2 - nd.y*s).scale(s));
  }
  showSidePanel();
}

async function showSidePanel() {
  const tags = [...selectedTags].map(id => graphData.tags.find(t => t.id === id)).filter(Boolean);
  if (!tags.length) { closeSidePanel(); return; }
  const panel = document.getElementById('sidePanel');
  document.getElementById('panelTitle').textContent = tags.map(t => t.name).join(' + ');
  document.getElementById('panelTypeLabel').textContent = tags.map(t => t.type).filter((v,i,a) => a.indexOf(v)===i).join(', ');
  document.getElementById('panelColorIndicator').style.background = tagColors[tags[0].type]||'#888';

  if (!pulseData) {
    document.getElementById('panelSummary').textContent = 'Loading artworks...';
    panel.classList.add('open');
    try {
      const resp = await fetch('./data/moma-pulse.json');
      pulseData = (await resp.json()).map(expand);
    } catch(e) { document.getElementById('panelSummary').textContent = 'Failed to load'; return; }
  }

  const fieldMap = {Department:'department', Classification:'classification', Nationality:'nationality', Decade:'decade'};
  // AND filter across all selected tags
  const objs = pulseData.filter(o => tags.every(tag => {
    const field = fieldMap[tag.type];
    return field && o[field] === tag.name;
  }));
  document.getElementById('panelSummary').textContent = `${tags.map(t=>t.name).join(' + ')} · ${objs.length.toLocaleString()} artworks`;

  // Set View Full Details link
  const viewBtn = document.getElementById('viewFullBtn');
  if (tags.length === 1) {
    viewBtn.href = `./momaViewByCategory.html?category=${encodeURIComponent(tags[0].name)}&type=${encodeURIComponent(tags[0].type)}`;
  } else {
    viewBtn.href = `./momaViewByCategory.html?` + tags.map(t => `tag=${encodeURIComponent(t.name)}`).join('&');
  }

  const grid = document.getElementById('objectGrid');
  grid.innerHTML = '';
  let shown = 0;
  const BATCH = 50;

  function renderBatch() {
    const batch = objs.slice(shown, shown + BATCH);
    batch.forEach(obj => {
      const card = document.createElement('div');
      card.className = 'object-card';
      let artistHtml = obj.artistName || '';
      if (artistHtml && artistData) {
        const a = (artistData.artists||artistData).find(x => x.name === artistHtml || x.DisplayName === artistHtml);
        if (a && (a.momaUrl || a.WikiQID)) {
          const url = a.momaUrl || `https://www.wikidata.org/wiki/${a.WikiQID}`;
          artistHtml = `<a href="${url}" target="_blank" class="artist-link">${artistHtml}</a>`;
        }
      }
      card.innerHTML =
        `<div class="object-title">${obj.title||'Untitled'}</div>` +
        `<div class="object-meta"><div class="object-meta-row">${artistHtml}${obj.date ? ' · '+obj.date : ''}</div></div>` +
        (obj.medium ? `<div class="object-meta" style="font-size:11px;color:var(--text-muted)">${obj.medium}</div>` : '') +
        (obj.id ? `<div style="margin-top:4px"><a href="https://www.moma.org/collection/works/${obj.id}" target="_blank" class="artist-link" style="font-size:11px">View on MoMA →</a></div>` : '');
      grid.appendChild(card);
    });
    shown += batch.length;
    // Load more button
    const existing = grid.querySelector('.load-more-btn');
    if (existing) existing.remove();
    if (shown < objs.length) {
      const more = document.createElement('button');
      more.className = 'load-more-btn';
      more.textContent = `Load more (${(objs.length-shown).toLocaleString()} remaining)`;
      more.addEventListener('click', renderBatch);
      grid.appendChild(more);
    }
  }
  renderBatch();
  panel.classList.add('open');
}

function closeSidePanel() {
  document.getElementById('sidePanel').classList.remove('open');
  selectedTag = null;
  selectedTags.clear();
  document.querySelectorAll('.legend-sub-item').forEach(el => {
    el.classList.remove('selected');
    const cb = el.querySelector('.sub-checkbox');
    if (cb) cb.textContent = '☐';
  });
  gEl.selectAll('circle').attr('stroke','rgba(255,255,255,0.2)').attr('stroke-width',1).attr('fill-opacity',0.85);
}

function setupLegend() {
  document.querySelectorAll('.legend-group').forEach(group => {
    const type = group.dataset.type;
    const tags = graphData.tags.filter(t => t.type === type).sort((a,b) => b.count - a.count);
    const submenu = group.querySelector('.legend-sub');
    tags.forEach(tag => {
      const item = document.createElement('div');
      item.className = 'legend-sub-item';
      item.dataset.tagId = tag.id;
      item.innerHTML = `<span class="sub-checkbox">☐</span><span>${tag.name}</span><span class="legend-count">${tag.count.toLocaleString()}</span>`;
      item.addEventListener('click', e => { e.stopPropagation(); selectTag(tag.id); });
      submenu.appendChild(item);
    });
    group.querySelector('.legend-item').addEventListener('click', () => {
      const isOpen = group.classList.contains('open');
      document.querySelectorAll('.legend-group').forEach(g => g.classList.remove('open'));
      if (!isOpen) group.classList.add('open');
    });
  });
  document.querySelector('[data-type="all"]').addEventListener('click', () => {
    document.querySelectorAll('.legend-group').forEach(g => g.classList.remove('open'));
    closeSidePanel();
  });
}

function setupSearch() {
  const input = document.getElementById('searchInput');
  const dropdown = document.getElementById('searchDropdown');
  let debounce = null;
  input.addEventListener('input', () => {
    clearTimeout(debounce);
    debounce = setTimeout(() => doSearch(input, dropdown), 200);
  });
  document.addEventListener('click', e => { if (!e.target.closest('.search-container')) dropdown.classList.remove('open'); });
}

function doSearch(input, dropdown) {
  const q = input.value.toLowerCase().trim();
  if (q.length < 2) { dropdown.classList.remove('open'); return; }

  // Search tags
  const tagResults = graphData.tags.filter(t => t.name.toLowerCase().includes(q)).sort((a,b) => b.count-a.count).slice(0,8);

  // Search artworks (title + artist) from pulse data
  let artworkResults = [];
  if (pulseData) {
    artworkResults = pulseData.filter(o =>
      (o.title && o.title.toLowerCase().includes(q)) ||
      (o.artistName && o.artistName.toLowerCase().includes(q))
    ).slice(0, 8);
  }

  if (!tagResults.length && !artworkResults.length) { dropdown.classList.remove('open'); return; }

  let html = '';
  if (tagResults.length) {
    html += '<div style="padding:4px 12px;font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px">Tags</div>';
    html += tagResults.map(t =>
      `<div class="search-item" data-id="${t.id}"><span class="search-dot" style="background:${tagColors[t.type]}"></span><span>${t.name}</span><span class="search-count">${t.count.toLocaleString()}</span></div>`
    ).join('');
  }
  if (artworkResults.length) {
    html += '<div style="padding:4px 12px;font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;border-top:1px solid var(--border-color);margin-top:4px;padding-top:8px">Artworks</div>';
    html += artworkResults.map(o =>
      `<div class="search-item search-artwork" data-moma-id="${o.id||''}">`+
      `<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${o.title||'Untitled'}</span>`+
      `<span class="search-count" style="flex-shrink:0">${o.artistName||''}</span></div>`
    ).join('');
  }

  dropdown.innerHTML = html;
  dropdown.querySelectorAll('.search-item:not(.search-artwork)').forEach(item => {
    item.addEventListener('click', () => { selectTag(item.dataset.id); input.value=''; dropdown.classList.remove('open'); });
  });
  dropdown.querySelectorAll('.search-artwork').forEach(item => {
    item.addEventListener('click', () => {
      const momaId = item.dataset.momaId;
      if (momaId) window.open(`https://www.moma.org/collection/works/${momaId}`, '_blank');
      input.value = ''; dropdown.classList.remove('open');
    });
  });
  dropdown.classList.add('open');
}

function setupZoom() {
  document.getElementById('zoomIn').addEventListener('click', () => svgEl.transition().call(zoomBehavior.scaleBy, 1.5));
  document.getElementById('zoomOut').addEventListener('click', () => svgEl.transition().call(zoomBehavior.scaleBy, 0.67));
  document.getElementById('zoomReset').addEventListener('click', () => svgEl.transition().call(zoomBehavior.transform, d3.zoomIdentity));
}

document.addEventListener('DOMContentLoaded', loadData);
  </script>
</body>
</html>
