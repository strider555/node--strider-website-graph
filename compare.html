<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M+ vs MoMA — Collection Comparison</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #30363d;
      --text: #e6edf3; --muted: #8b949e;
      --mplus: #e6a817; --moma: #e64a4a;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

    header {
      padding: 20px 32px; display:flex; align-items:center; justify-content:space-between;
      border-bottom: 1px solid var(--border); background: var(--surface);
    }
    header h1 { font-size: 22px; font-weight: 700; }
    header .subtitle { color: var(--muted); font-size: 13px; margin-top: 2px; }
    .nav-links { display:flex; gap:12px; }
    .nav-links a {
      color: var(--muted); text-decoration:none; font-size:13px; padding:6px 12px;
      border:1px solid var(--border); border-radius:8px; transition: all 0.2s;
    }
    .nav-links a:hover { color: var(--text); border-color: var(--muted); }

    .stats-bar {
      display:flex; gap:32px; padding:16px 32px; border-bottom:1px solid var(--border);
      background: rgba(22,27,34,0.6);
    }
    .stat { text-align:center; }
    .stat-value { font-size:28px; font-weight:700; }
    .stat-label { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; }
    .stat-mplus .stat-value { color: var(--mplus); }
    .stat-moma .stat-value { color: var(--moma); }

    .tabs {
      display:flex; gap:0; padding:0 32px; border-bottom:1px solid var(--border); background:var(--surface);
    }
    .tab {
      padding:12px 20px; cursor:pointer; font-size:14px; color:var(--muted);
      border-bottom:2px solid transparent; transition: all 0.2s;
    }
    .tab:hover { color:var(--text); }
    .tab.active { color:var(--text); border-bottom-color:var(--mplus); }

    .chart-container { padding:24px 32px; }
    .chart-title { font-size:16px; font-weight:600; margin-bottom:4px; }
    .chart-subtitle { font-size:12px; color:var(--muted); margin-bottom:16px; }
    #sankeyChart, #butterflyChart, #heatmapChart { width:100%; }

    .legend-row { display:flex; gap:24px; justify-content:center; margin:16px 0; }
    .legend-item { display:flex; align-items:center; gap:6px; font-size:13px; }
    .legend-dot { width:12px; height:12px; border-radius:3px; }

    /* Butterfly chart bars */
    .butterfly-row { display:flex; align-items:center; margin:3px 0; height:28px; }
    .butterfly-label { width:90px; text-align:center; font-size:12px; font-weight:500; flex-shrink:0; }
    .butterfly-left { flex:1; display:flex; justify-content:flex-end; }
    .butterfly-right { flex:1; display:flex; justify-content:flex-start; }
    .butterfly-bar { height:22px; border-radius:3px; min-width:2px; transition: width 0.5s; position:relative; }
    .butterfly-bar:hover { opacity:0.8; }
    .butterfly-bar .bar-tooltip {
      display:none; position:absolute; top:-28px; padding:3px 8px; background:#000;
      border-radius:4px; font-size:11px; white-space:nowrap; z-index:10;
    }
    .butterfly-bar:hover .bar-tooltip { display:block; }
    .butterfly-left .bar-tooltip { right:0; }
    .butterfly-right .bar-tooltip { left:0; }
    .butterfly-pct { font-size:10px; color:var(--muted); padding:0 6px; min-width:40px; }
    .butterfly-left .butterfly-pct { text-align:right; }

    /* Heatmap */
    .heatmap-grid { display:grid; grid-template-columns:180px 1fr 1fr; gap:1px; background:var(--border); }
    .heatmap-cell { padding:8px 12px; background:var(--bg); font-size:13px; }
    .heatmap-header { background:var(--surface); font-weight:600; font-size:12px; text-transform:uppercase; }
    .heatmap-bar-cell { position:relative; }
    .heatmap-bar { height:100%; position:absolute; top:0; left:0; opacity:0.3; }
    .heatmap-val { position:relative; z-index:1; }

    @media (max-width: 768px) {
      header { padding:12px 16px; flex-direction:column; gap:8px; }
      .stats-bar { padding:12px 16px; gap:16px; flex-wrap:wrap; }
      .stat-value { font-size:20px; }
      .tabs { padding:0 16px; overflow-x:auto; }
      .chart-container { padding:16px; }
      .butterfly-label { width:70px; font-size:11px; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>M+ vs MoMA — Collection DNA</h1>
      <div class="subtitle">Comparing two world-class museum collections</div>
    </div>
    <div class="nav-links">
      <a href="./index.html">← M+ Explorer</a>
      <a href="./moma.html">MoMA Explorer</a>
    </div>
  </header>

  <div class="stats-bar" id="statsBar"></div>

  <div class="legend-row">
    <div class="legend-item"><div class="legend-dot" style="background:var(--mplus)"></div>M+ Hong Kong</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--moma)"></div>MoMA New York</div>
  </div>

  <div class="tabs" id="tabs">
    <select id="viewSelect" style="padding:10px 16px;font-size:14px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:8px;cursor:pointer;min-width:220px">
      <option value="region">By Region</option>
      <option value="nationality">By Nationality (Top 20)</option>
      <option value="decade">By Decade</option>
      <option value="department">By Department</option>
      <option value="overlap">Artist Overlap Network</option>
    </select>
  </div>

  <div class="chart-container" id="chartArea"></div>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script>
let data = null;
const MPLUS = '#e6a817';
const MOMA = '#e64a4a';

async function init() {
  const resp = await fetch('./data/comparison.json?v=' + Date.now());
  data = await resp.json();

  // Stats bar
  const bar = document.getElementById('statsBar');
  bar.innerHTML = `
    <div class="stat stat-mplus"><div class="stat-value">${data.museums.mplus.total.toLocaleString()}</div><div class="stat-label">M+ Artworks</div></div>
    <div class="stat stat-moma"><div class="stat-value">${data.museums.moma.total.toLocaleString()}</div><div class="stat-label">MoMA Artworks</div></div>
    <div class="stat"><div class="stat-value">${(data.museums.moma.total / data.museums.mplus.total).toFixed(1)}×</div><div class="stat-label">Size Ratio</div></div>
  `;

  // Dropdown
  const sel = document.getElementById('viewSelect');
  sel.addEventListener('change', () => renderView(sel.value));

  renderView('region');
}

function renderView(view) {
  const area = document.getElementById('chartArea');

  if (view === 'region') {
    renderButterfly(area, data.region, 'Geographic Regions', 'Share of collection by world region (% of artworks with known nationality)');
  } else if (view === 'nationality') {
    renderButterfly(area, data.nationality, 'Top Nationalities', 'Top 20 artist nationalities — percentage of total collection', 20);
  } else if (view === 'decade') {
    renderButterfly(area, data.decade, 'Artworks by Decade', 'When were the artworks created?');
  } else if (view === 'overlap') {
    renderOverlap(area);
  }
}

function renderButterfly(container, dataset, title, subtitle, limit) {
  // Merge all keys
  let keys = [...new Set([...Object.keys(dataset.mplus), ...Object.keys(dataset.moma)])];
  
  // Sort: by total count desc (or chronologically for decades)
  if (keys[0] && keys[0].match(/^\d{4}s$/)) {
    keys.sort();
  } else {
    keys.sort((a,b) => ((dataset.mplus[b]||0)+(dataset.moma[b]||0)) - ((dataset.mplus[a]||0)+(dataset.moma[a]||0)));
  }
  if (limit) keys = keys.slice(0, limit);

  const mpTotal = Object.values(dataset.mplus).reduce((a,b)=>a+b, 0);
  const moTotal = Object.values(dataset.moma).reduce((a,b)=>a+b, 0);
  const maxPct = Math.max(...keys.map(k => Math.max((dataset.mplus[k]||0)/mpTotal, (dataset.moma[k]||0)/moTotal)));

  let html = `<div class="chart-title">${title}</div><div class="chart-subtitle">${subtitle}</div>`;
  html += '<div style="display:flex;gap:8px;margin-bottom:8px;font-size:11px;color:var(--muted)"><div style="flex:1;text-align:right">← M+</div><div style="width:90px"></div><div style="flex:1">MoMA →</div></div>';

  keys.forEach(k => {
    const mpVal = dataset.mplus[k] || 0;
    const moVal = dataset.moma[k] || 0;
    const mpPct = mpTotal ? (mpVal / mpTotal * 100) : 0;
    const moPct = moTotal ? (moVal / moTotal * 100) : 0;
    const mpW = maxPct ? (mpPct / (maxPct * 100) * 100) : 0;
    const moW = maxPct ? (moPct / (maxPct * 100) * 100) : 0;

    html += `<div class="butterfly-row">
      <div class="butterfly-left">
        <span class="butterfly-pct">${mpVal > 0 ? mpPct.toFixed(1)+'%' : ''}</span>
        <div class="butterfly-bar" style="width:${mpW}%;background:${MPLUS}">
          <span class="bar-tooltip">${k}: ${mpVal.toLocaleString()} (${mpPct.toFixed(1)}%)</span>
        </div>
      </div>
      <div class="butterfly-label">${k}</div>
      <div class="butterfly-right">
        <div class="butterfly-bar" style="width:${moW}%;background:${MOMA}">
          <span class="bar-tooltip">${k}: ${moVal.toLocaleString()} (${moPct.toFixed(1)}%)</span>
        </div>
        <span class="butterfly-pct">${moVal > 0 ? moPct.toFixed(1)+'%' : ''}</span>
      </div>
    </div>`;
  });

  container.innerHTML = html;
}

function renderHeatmap(container, deptData, catData, title) {
  // Show both museums' departments side by side
  const allDepts = [...new Set([...Object.keys(deptData.mplus), ...Object.keys(deptData.moma)])];
  const mpTotal = data.museums.mplus.total;
  const moTotal = data.museums.moma.total;

  let html = `<div class="chart-title">${title}</div>
    <div class="chart-subtitle">Department/Area breakdown — absolute count and % of total</div>
    <div style="margin-top:16px">
    <h3 style="font-size:14px;margin-bottom:8px;color:${MPLUS}">M+ Areas</h3>`;

  const mpDepts = Object.entries(deptData.mplus).sort((a,b)=>b[1]-a[1]);
  const maxMp = mpDepts[0]?.[1] || 1;
  mpDepts.forEach(([name, count]) => {
    const pct = (count/mpTotal*100).toFixed(1);
    const w = (count/maxMp*100);
    html += `<div style="display:flex;align-items:center;margin:4px 0;gap:8px">
      <div style="width:200px;font-size:13px;text-align:right">${name}</div>
      <div style="flex:1;position:relative;height:24px;background:rgba(255,255,255,0.03);border-radius:4px;overflow:hidden">
        <div style="width:${w}%;height:100%;background:${MPLUS};opacity:0.4;border-radius:4px"></div>
        <span style="position:absolute;left:8px;top:3px;font-size:12px">${count.toLocaleString()} (${pct}%)</span>
      </div>
    </div>`;
  });

  html += `<h3 style="font-size:14px;margin:16px 0 8px;color:${MOMA}">MoMA Departments</h3>`;
  const moDepts = Object.entries(deptData.moma).sort((a,b)=>b[1]-a[1]);
  const maxMo = moDepts[0]?.[1] || 1;
  moDepts.forEach(([name, count]) => {
    const pct = (count/moTotal*100).toFixed(1);
    const w = (count/maxMo*100);
    html += `<div style="display:flex;align-items:center;margin:4px 0;gap:8px">
      <div style="width:200px;font-size:13px;text-align:right">${name}</div>
      <div style="flex:1;position:relative;height:24px;background:rgba(255,255,255,0.03);border-radius:4px;overflow:hidden">
        <div style="width:${w}%;height:100%;background:${MOMA};opacity:0.4;border-radius:4px"></div>
        <span style="position:absolute;left:8px;top:3px;font-size:12px">${count.toLocaleString()} (${pct}%)</span>
      </div>
    </div>`;
  });

  html += '</div>';
  container.innerHTML = html;
}

let overlapData = null;
async function renderOverlap(container) {
  if (!overlapData) {
    container.innerHTML = '<div class="chart-title">Loading overlap data...</div>';
    const resp = await fetch('./data/overlap.json?v=' + Date.now());
    overlapData = await resp.json();
  }
  const s = overlapData.stats;
  const artists = overlapData.artists;

  // Venn diagram + force network
  let html = `<div class="chart-title">Artist Overlap</div>
    <div class="chart-subtitle">${s.both} artists appear in both collections</div>
    <svg id="vennSvg" width="100%" height="280" style="margin:8px 0"></svg>
    <div class="chart-title" style="font-size:14px;margin-top:16px">Overlap Network — Top 80 Shared Artists</div>
    <div class="chart-subtitle">Node size = total works across both museums. Color = collection bias.</div>
    <svg id="overlapSvg" width="100%" height="500" style="background:rgba(0,0,0,0.2);border-radius:12px"></svg>
    <div id="overlapTooltip" style="position:fixed;display:none;padding:8px 12px;background:#000;border:1px solid var(--border);border-radius:6px;font-size:12px;pointer-events:none;z-index:100"></div>
    <div style="margin-top:16px">
      <div class="chart-title" style="font-size:14px">Top 30 Shared Artists</div>
      <div id="overlapList"></div>
    </div>`;
  container.innerHTML = html;

  // Draw Venn diagram
  const vSvg = d3.select('#vennSvg');
  const vW = vSvg.node().getBoundingClientRect().width;
  const vH = 280;
  vSvg.attr('width', vW);
  const cx = vW / 2, cy = vH / 2;
  const rMplus = 90, rMoma = 110, overlap = 50; // circle overlap distance

  // M+ circle (left)
  vSvg.append('circle').attr('cx', cx - overlap).attr('cy', cy).attr('r', rMplus)
    .attr('fill', MPLUS).attr('fill-opacity', 0.2).attr('stroke', MPLUS).attr('stroke-width', 2);
  // MoMA circle (right)
  vSvg.append('circle').attr('cx', cx + overlap).attr('cy', cy).attr('r', rMoma)
    .attr('fill', MOMA).attr('fill-opacity', 0.2).attr('stroke', MOMA).attr('stroke-width', 2);

  // Labels
  vSvg.append('text').attr('x', cx - overlap - 40).attr('y', cy - 10)
    .attr('text-anchor', 'middle').attr('fill', MPLUS).attr('font-size', '28px').attr('font-weight', '700')
    .text(s.mplusOnly.toLocaleString());
  vSvg.append('text').attr('x', cx - overlap - 40).attr('y', cy + 14)
    .attr('text-anchor', 'middle').attr('fill', '#ccc').attr('font-size', '12px')
    .text('M+ only');

  vSvg.append('text').attr('x', cx).attr('y', cy - 10)
    .attr('text-anchor', 'middle').attr('fill', '#c084fc').attr('font-size', '28px').attr('font-weight', '700')
    .text(s.both);
  vSvg.append('text').attr('x', cx).attr('y', cy + 14)
    .attr('text-anchor', 'middle').attr('fill', '#ccc').attr('font-size', '12px')
    .text('Both');

  vSvg.append('text').attr('x', cx + overlap + 40).attr('y', cy - 10)
    .attr('text-anchor', 'middle').attr('fill', MOMA).attr('font-size', '28px').attr('font-weight', '700')
    .text(s.momaOnly.toLocaleString());
  vSvg.append('text').attr('x', cx + overlap + 40).attr('y', cy + 14)
    .attr('text-anchor', 'middle').attr('fill', '#ccc').attr('font-size', '12px')
    .text('MoMA only');

  // Museum name labels
  vSvg.append('text').attr('x', cx - overlap - 40).attr('y', cy + rMplus + 24)
    .attr('text-anchor', 'middle').attr('fill', MPLUS).attr('font-size', '14px').attr('font-weight', '600')
    .text('M+ Hong Kong');
  vSvg.append('text').attr('x', cx + overlap + 40).attr('y', cy + rMoma + 24)
    .attr('text-anchor', 'middle').attr('fill', MOMA).attr('font-size', '14px').attr('font-weight', '600')
    .text('MoMA New York');

  // Force network of top 80 overlap artists
  const top = artists.slice(0, 80);
  const svg = d3.select('#overlapSvg');
  const w = svg.node().getBoundingClientRect().width;
  const h = 500;
  svg.attr('width', w);
  const g = svg.append('g');
  svg.call(d3.zoom().scaleExtent([0.3,5]).on('zoom', e => g.attr('transform', e.transform)));

  // Nodes = artists, sized by total works
  const maxTotal = d3.max(top, d => d.total);
  const r = d3.scaleSqrt().domain([1, maxTotal]).range([4, 30]);
  const nodes = top.map(a => ({...a, radius: r(a.total)}));

  // Color by bias: gold=M+ heavy, red=MoMA heavy, purple=balanced
  function biasColor(a) {
    const ratio = a.mplus / (a.mplus + a.moma);
    if (ratio > 0.6) return '#e6a817';
    if (ratio < 0.4) return '#e64a4a';
    return '#c084fc';
  }

  // Links between artists that share nationality
  const links = [];
  for (let i=0; i<nodes.length; i++) {
    for (let j=i+1; j<nodes.length; j++) {
      if (nodes[i].nat && nodes[i].nat === nodes[j].nat && nodes[i].nat !== '') {
        links.push({source:i, target:j});
      }
    }
  }

  const sim = d3.forceSimulation(nodes)
    .force('charge', d3.forceManyBody().strength(-80))
    .force('center', d3.forceCenter(w/2, h/2))
    .force('collision', d3.forceCollide(d => d.radius + 6))
    .force('link', d3.forceLink(links).distance(60).strength(0.1));

  const link = g.append('g').selectAll('line').data(links).join('line')
    .attr('stroke','rgba(255,255,255,0.05)').attr('stroke-width',1);

  const tip = document.getElementById('overlapTooltip');
  const node = g.append('g').selectAll('circle').data(nodes).join('circle')
    .attr('r', d => d.radius)
    .attr('fill', d => biasColor(d))
    .attr('fill-opacity', 0.8)
    .attr('stroke', 'rgba(255,255,255,0.2)').attr('stroke-width', 1)
    .attr('cursor', 'pointer')
    .on('mouseover', (e,d) => {
      tip.style.display='block'; tip.style.left=(e.pageX+12)+'px'; tip.style.top=(e.pageY-10)+'px';
      tip.innerHTML=`<strong>${d.name}</strong><br>M+: ${d.mplus} · MoMA: ${d.moma}<br>${d.nat||'Unknown'}`;
    })
    .on('mousemove', e => { tip.style.left=(e.pageX+12)+'px'; tip.style.top=(e.pageY-10)+'px'; })
    .on('mouseout', () => { tip.style.display='none'; })
    .call(d3.drag()
      .on('start',(e,d)=>{if(!e.active)sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;})
      .on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y;})
      .on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}));

  const label = g.append('g').selectAll('text').data(nodes.filter(d=>d.radius>10)).join('text')
    .text(d => d.name.length > 20 ? d.name.slice(0,18)+'…' : d.name)
    .attr('text-anchor','middle').attr('dy', d => d.radius+12)
    .attr('fill','#aaa').attr('font-size','10px').attr('pointer-events','none');

  sim.on('tick', () => {
    link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
    node.attr('cx',d=>d.x).attr('cy',d=>d.y);
    label.attr('x',d=>d.x).attr('y',d=>d.y);
  });

  // List top 30
  const list = document.getElementById('overlapList');
  artists.slice(0,30).forEach(a => {
    const total = a.mplus + a.moma;
    const mpPct = (a.mplus/total*100).toFixed(0);
    const moPct = (a.moma/total*100).toFixed(0);
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;margin:4px 0;gap:8px';
    row.innerHTML = `<div style="width:220px;font-size:13px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;justify-content:flex-end;gap:6px">
        <span>${a.name}</span>
        ${a.mplusUrl ? `<a href="${a.mplusUrl}" target="_blank" title="View on M+" style="color:${MPLUS};font-size:10px;text-decoration:none;flex-shrink:0">M+</a>` : ''}
        ${a.momaUrl ? `<a href="${a.momaUrl}" target="_blank" title="View on MoMA" style="color:${MOMA};font-size:10px;text-decoration:none;flex-shrink:0">MoMA</a>` : ''}
      </div>
      <div style="flex:1;display:flex;height:20px;border-radius:4px;overflow:hidden;background:rgba(255,255,255,0.05)">
        <div style="width:${mpPct}%;background:${MPLUS};opacity:0.6"></div>
        <div style="width:${moPct}%;background:${MOMA};opacity:0.6"></div>
      </div>
      <div style="font-size:11px;color:var(--muted);min-width:120px">${a.mplus} M+ · ${a.moma} MoMA</div>`;
    list.appendChild(row);
  });

  // Legend for network colors
  const legendHtml = document.createElement('div');
  legendHtml.style.cssText = 'display:flex;gap:16px;justify-content:center;margin:12px 0;font-size:12px';
  legendHtml.innerHTML = `<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:50%;background:#e6a817"></span>M+ heavy</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:50%;background:#c084fc"></span>Balanced</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:50%;background:#e64a4a"></span>MoMA heavy</span>`;
  svg.node().parentNode.insertBefore(legendHtml, svg.node().nextSibling);
}

document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
