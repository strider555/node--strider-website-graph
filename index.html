<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M+ Museum Collection Explorer</title>
  <link rel="stylesheet" href="./styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="app-header">
    <div>
      <h1>M+ Collection Explorer</h1>
      <div class="subtitle">Interactive visualization of 13,000+ artworks</div>
    </div>
    <div class="controls">
      <div class="search-container">
        <input
          type="text"
          class="search-input"
          id="searchInput"
          placeholder="Search tags, artists, or artworks..."
          autocomplete="off"
        >
        <div class="search-dropdown" id="searchDropdown"></div>
      </div>
      <div class="filter-buttons" id="filterButtons">
        <button class="filter-btn active" data-area="all">All</button>
        <button class="filter-btn" data-area="Visual Art">Visual Art</button>
        <button class="filter-btn" data-area="Design and Architecture">Design</button>
        <button class="filter-btn" data-area="Moving Image">Moving Image</button>
      </div>
      <button class="filter-btn sigg-toggle" id="siggToggle">Sigg Collection</button>
      <button class="filter-btn browse-btn" id="browseBtn">📋 Browse</button>
      <a href="./pulse.html" class="filter-btn" style="text-decoration:none;display:inline-flex;align-items:center;gap:4px">✨ Pulse</a>
    </div>
  </header>

  <!-- Browse Modal -->
  <div class="browse-modal" id="browseModal">
    <div class="browse-content">
      <div class="browse-header">
        <h2>Browse Artists</h2>
        <div class="browse-tabs" id="browseTabs">
          <button class="browse-tab active" data-tab="all">All (489)</button>
          <button class="browse-tab" data-tab="sigg">Sigg Collection</button>
        </div>
        <input type="text" class="browse-search" id="browseSearch" placeholder="Filter artists..." autocomplete="off">
        <button class="close-btn browse-close" id="closeBrowse">×</button>
      </div>
      <div class="browse-alphabet" id="browseAlphabet"></div>
      <div class="browse-list" id="browseList"></div>
    </div>
  </div>

  <main class="app-main">
    <div id="loading" class="loading">
      <div class="spinner">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div>Loading collection data...</div>
    </div>

    <div id="graph-container" style="display: none;">
      <svg id="graph"></svg>

      <div class="legend" id="legend">
        <h3>Tag Types</h3>
        <div class="legend-item active" data-type="all">
          <div class="legend-color" style="background: linear-gradient(135deg, #E6A817, #4ecdc4, #ff6b6b);"></div>
          <span>All Types</span>
        </div>
        <div class="legend-group" data-type="area">
          <div class="legend-item" data-type="area">
            <div class="legend-color" style="background: #E6A817;"></div>
            <span>Area</span>
            <span class="legend-expand">▸</span>
          </div>
          <div class="legend-sub" id="sub-area"></div>
        </div>
        <div class="legend-group" data-type="category">
          <div class="legend-item" data-type="category">
            <div class="legend-color" style="background: #4ecdc4;"></div>
            <span>Category</span>
            <span class="legend-expand">▸</span>
          </div>
          <div class="legend-sub" id="sub-category"></div>
        </div>
        <div class="legend-group" data-type="medium">
          <div class="legend-item" data-type="medium">
            <div class="legend-color" style="background: #ff6b6b;"></div>
            <span>Medium</span>
            <span class="legend-expand">▸</span>
          </div>
          <div class="legend-sub" id="sub-medium"></div>
        </div>
        <div class="legend-group" data-type="nationality">
          <div class="legend-item" data-type="nationality">
            <div class="legend-color" style="background: #45b7d1;"></div>
            <span>Nationality</span>
            <span class="legend-expand">▸</span>
          </div>
          <div class="legend-sub" id="sub-nationality"></div>
        </div>
        <div class="legend-group" data-type="decade">
          <div class="legend-item" data-type="decade">
            <div class="legend-color" style="background: #96ceb4;"></div>
            <span>Decade</span>
            <span class="legend-expand">▸</span>
          </div>
          <div class="legend-sub" id="sub-decade"></div>
        </div>
        <div class="legend-group" data-type="collection">
          <div class="legend-item" data-type="collection">
            <div class="legend-color" style="background: #c084fc;"></div>
            <span>Collection</span>
            <span class="legend-expand">▸</span>
          </div>
          <div class="legend-sub" id="sub-collection"></div>
        </div>
      </div>

      <div class="zoom-controls">
        <button class="zoom-btn" id="zoomIn" title="Zoom In">+</button>
        <button class="zoom-btn" id="zoomOut" title="Zoom Out">−</button>
        <button class="zoom-btn" id="resetZoom" title="Reset View">⟲</button>
      </div>
    </div>

    <div class="side-panel" id="sidePanel">
      <div class="panel-header">
        <div class="panel-header-content">
          <div class="panel-title-wrapper">
            <div class="panel-color-indicator" id="panelColorIndicator"></div>
            <div>
              <div class="panel-title" id="panelTitle">Tag Name</div>
              <div class="panel-type-label" id="panelTypeLabel">Category</div>
            </div>
          </div>
          <div class="panel-summary" id="panelSummary">Tag · Type · 0 artworks</div>
        </div>
        <button class="close-btn" id="closePanel">×</button>
      </div>
      <div class="panel-content">
        <div class="object-grid" id="objectGrid"></div>
      </div>
      <div class="panel-footer">
        <a class="detail-btn" id="viewDetailsBtn" href="#" target="_blank">View Full Details →</a>
      </div>
    </div>

    <div class="tooltip" id="tooltip">
      <div class="tooltip-title" id="tooltipTitle"></div>
      <div class="tooltip-detail" id="tooltipDetail"></div>
      <div class="tooltip-detail">Click to explore →</div>
    </div>
  </main>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="./graph.js"></script>
  <script src="./main.js"></script>
</body>
</html>
