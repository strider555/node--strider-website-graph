<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>文章內容</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      :root {
        --bg: #0b1020;
        --fg: #e5e7eb;
        --muted: #94a3b8;
        --card: #0f172a;
        --border: #1e293b;
        --accent: #38bdf8;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans", Ubuntu, Cantarell, "Helvetica Neue", Arial; background: var(--bg); color: var(--fg); }
      a { color: var(--accent); text-decoration: none; }
      a:hover { text-decoration: underline; }

      header { border-bottom: 1px solid var(--border); background: var(--card); }
      .container { max-width: 1200px; margin: 0 auto; padding: 16px; }
      .brand { display: flex; align-items: center; gap: 12px; }
      .brand h1 { font-size: 18px; margin: 0; }

      main .layout { display: grid; grid-template-columns: 300px 1fr; gap: 16px; align-items: start; }
      aside.sidebar { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; position: sticky; top: 8px; max-height: calc(100vh - 100px); overflow: auto; }
      .list-title { margin: 0 0 8px; font-size: 16px; color: var(--muted); }
      .article-list { list-style: none; padding: 0; margin: 0; }
      .article-list li { margin: 0; padding: 6px 0; border-bottom: 1px dashed #233046; }
      .article-list a { color: #e5e7eb; text-decoration: none; }
      .article-list a:hover { text-decoration: underline; }

      main .article { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 24px; margin-top: 16px; }
      .title { font-size: 28px; line-height: 1.25; margin: 0 0 8px; }
      .meta { color: var(--muted); font-size: 14px; margin-bottom: 12px; }
      .tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
      .tag { border: 1px solid var(--border); background: #0b1028; color: #cbd5e1; padding: 4px 8px; border-radius: 999px; font-size: 12px; }
      .content { line-height: 1.8; font-size: 16px; white-space: pre-wrap; }

      #graph-embed { height: 420px; margin-top: 16px; border: 1px solid var(--border); border-radius: 10px; }
      @media (max-width: 900px) {
        main .layout { grid-template-columns: 1fr; }
        aside.sidebar { position: static; max-height: none; }
      }

      .toolbar { display: flex; gap: 8px; margin-top: 16px; }
      .btn { border: 1px solid var(--border); background: #0b1328; color: var(--fg); padding: 8px 12px; border-radius: 8px; cursor: pointer; }
      .btn:hover { background: #0d1830; }

      footer { color: var(--muted); text-align: center; padding: 16px; }
      .error { color: #fca5a5; padding: 12px; background: #1a1020; border: 1px solid #3f1f2f; border-radius: 8px; }
    </style>
  </head>
  <body>
    <header>
      <div class="container brand">
        <a href="./index.html" class="logo" aria-label="回首頁">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 10.5L12 3l9 7.5V21a1 1 0 0 1-1 1h-6v-7H10v7H4a1 1 0 0 1-1-1v-10.5z" fill="#38bdf8"/></svg>
        </a>
        <h1>文章內容</h1>
      </div>
    </header>

    <main>
      <div class="container">
        <div class="layout">
          <aside class="sidebar">
            <h3 class="list-title">文章列表</h3>
            <ul class="article-list" id="articleList"></ul>
          </aside>
          <div>
            <article class="article" id="article">
              <h2 class="title" id="title">載入中…</h2>
              <div class="meta" id="meta"></div>
              <div class="tags" id="tags"></div>
              <div class="content" id="content"></div>
              <div class="toolbar">
                <button class="btn" id="openGraph">回到關聯圖</button>
                <button class="btn" id="share">分享連結</button>
              </div>
            </article>
            <div id="graph-embed"></div>
            <div id="error" class="error" style="display:none"></div>
          </div>
        </div>
      </div>
    </main>

    <footer>
      <div class="container">© 2025 Tag Graph Demo</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <script src="./graph.js"></script>
    <script>
      function getQueryParam(name) {
        const url = new URL(window.location.href);
        return url.searchParams.get(name);
      }

      function formatDate(dt) {
        try {
          const d = new Date(dt);
          return d.toLocaleString('zh-Hant', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
        } catch(e) { return dt; }
      }

      async function loadArticle(articleId) {
        const errorEl = document.getElementById('error');
        errorEl.style.display = 'none';
        try {
          const res = await fetch(`./articles/${articleId}.json`, { cache: 'no-store' });
          if (!res.ok) throw new Error('無法載入文章');
          const data = await res.json();
          render(data);
        } catch (e) {
          errorEl.textContent = `載入失敗：${e.message}`;
          errorEl.style.display = 'block';
          document.getElementById('title').textContent = '找不到文章';
          document.getElementById('meta').textContent = '';
          document.getElementById('tags').innerHTML = '';
          document.getElementById('content').textContent = '';
        }
      }

      function render(data) {
        document.getElementById('title').textContent = data.title;
        document.getElementById('meta').textContent = `作者：${data.author}｜發布：${formatDate(data.publishedAt)}｜ID：${data.id}`;
        const tagsEl = document.getElementById('tags');
        tagsEl.innerHTML = '';
        (data.tags || []).forEach(t => {
          const a = document.createElement('a');
          a.className = 'tag';
          a.textContent = t;
          a.href = `./index.html#tag=${encodeURIComponent(t)}`;
          tagsEl.appendChild(a);
        });
        document.getElementById('content').textContent = data.content;
      }

      async function loadIndex() {
        const res = await fetch('./data/articles-index.json', { cache: 'no-store' });
        if (!res.ok) throw new Error('無法載入文章列表');
        return res.json();
      }

      function renderList(indexData) {
        const ul = document.getElementById('articleList');
        ul.innerHTML = '';
        indexData.articles.forEach(a => {
          const li = document.createElement('li');
          const link = document.createElement('a');
          link.href = `./viewArticle.html?articleId=${encodeURIComponent(a.id)}`;
          link.textContent = `${a.title}`;
          li.appendChild(link);
          ul.appendChild(li);
        });
      }

      function buildGraphFromIndex(indexData) {
        // Build nodes and links from index data
        const nodes = indexData.tags.map(t => ({ id: t.id, count: t.count }));
        const links = indexData.links.map(l => ({ source: l.source, target: l.target, weight: l.weight }));
        return { nodes, links };
      }

      async function bootstrap() {
        const id = getQueryParam('articleId');
        const [indexData] = await Promise.all([loadIndex()]);
        renderList(indexData);
        let articleData = null;
        if (id) { await loadArticle(id); }
        try {
          const res = await fetch(`./articles/${id}.json`, { cache: 'no-store' });
          if (res.ok) articleData = await res.json();
        } catch (_) {}
        const fullGraph = buildGraphFromIndex(indexData);
        const seeds = (articleData && articleData.tags) ? articleData.tags : [];
        const filtered = TagGraph.filterDataByTags(fullGraph, seeds, 1);
        TagGraph.createTagGraph(document.getElementById('graph-embed'), filtered);
      }

      bootstrap().catch(err => {
        const errorEl = document.getElementById('error');
        errorEl.textContent = `初始化失敗：${err.message}`;
        errorEl.style.display = 'block';
      });

      document.getElementById('openGraph').addEventListener('click', () => {
        window.location.href = './index.html';
      });

      document.getElementById('share').addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(window.location.href);
          alert('已複製分享連結');
        } catch (e) {
          alert('複製失敗，請手動複製網址');
        }
      });
    </script>
  </body>
</html>
